<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 PyMaster: Learn Python Edition</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { background-color: #04091a; color: #a8c8e8; font-family: sans-serif; padding: 15px; margin: 0; }
        h2 { color: #dff0ff; margin: 10px 0; font-size: 22px; text-align: center; }
        .layout { display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #080f22; padding: 15px; border-radius: 10px; border: 1px solid #132440; }
        .lesson-selector { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .lesson-btn { background: #0c1830; color: #a8c8e8; border: 1px solid #132440; padding: 8px 15px; border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; }
        .lesson-btn.active { background: #00d4ff; color: #000; font-weight: bold; border-color: #00d4ff; }
        textarea { width: 100%; height: 160px; background: #0c1830; color: #dff0ff; padding: 12px; font-family: monospace; border-radius: 10px; border: 1px solid #132440; resize: none; font-size: 14px; box-sizing: border-box; outline: none; }
        button.run-btn { background: #39ff14; color: #000; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; width: 100%; margin-top: 10px; }
        button:disabled { background: #132440; color: #3a6080; cursor: not-allowed; }
        .output-box { background: #020810; padding: 12px; font-family: monospace; border-radius: 10px; border: 1px solid #132440; color: #00d4ff; margin-top: 15px; min-height: 60px; }
        pre { margin: 0; white-space: pre-wrap; }
        code { background: #0c1830; color: #ffc400; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

    <h2>🐍 PyMaster Academy</h2>
    
    <div class="layout">
        <div class="panel">
            <div style="font-size: 11px; color: #3a6080; text-transform: uppercase; margin-bottom: 8px; font-weight: bold;">Select Your Lesson:</div>
            <div class="lesson-selector" id="lessonMenu"></div>
        </div>

        <div class="panel">
            <h3 id="lessonTitle" style="color: #dff0ff; margin: 0 0 8px 0; font-size: 18px;">Loading...</h3>
            <p id="lessonTask" style="margin: 0; font-size: 13px; line-height: 1.5; color: #a8c8e8;"></p>
        </div>

        <div class="panel">
            <textarea id="codeEditor"></textarea>
            <button id="runBtn" class="run-btn" onclick="runPythonCode()" disabled>⏳ LOADING ENGINE...</button>
            <div class="output-box">
                <div style="color: #3a6080; font-size: 11px; margin-bottom: 5px;">Console Output:</div>
                <pre id="output">Starting up system compiler streams...</pre>
            </div>
        </div>
    </div>

    <script>
        // Full Structured Course Data Array
        const lessons = [
            {
                id: "les1",
                title: "🌱 Lesson 1: Variable Boxes",
                task: "Variables store data. Create a variable named <code>coins</code> and set it equal to <code>50</code>. On the next line, write <code>print(coins)</code> and tap Run!",
                defaultCode: "# Create your variable below\n"
            },
            {
                id: "les2",
                title: "🔢 Lesson 2: Doing Math",
                task: "Python loves numbers! Create a variable named <code>total</code> and set it to <code>10 + 5</code>. Then use <code>print(total)</code> to check the computer's math.",
                defaultCode: "# Calculate the total below\n"
            },
            {
                id: "les3",
                title: "💬 Lesson 3: Text Strings",
                task: "Text strings must always sit inside quotation marks. Create a variable named <code>hero</code> and assign your favorite character name to it (like <code>\"Batman\"</code>). Print it!",
                defaultCode: "# Write your string variable below\n"
            },
            {
                id: "les4",
                title: "🔄 Lesson 4: Smart Loops",
                task: "A <code>for</code> loop repeats things instantly. Run this starter code directly to see Python count automatically from 0 up to 4!",
                defaultCode: "# Look how loops work:\nfor x in range(5):\n    print(x)"
            }
        ];

        let currentLessonIndex = 0;
        let pyodide;
        const outputElement = document.getElementById("output");
        const runBtn = document.getElementById("runBtn");

        // Render the Top Horizontal Menu Bar
        function buildMenu() {
            const menuContainer = document.getElementById("lessonMenu");
            menuContainer.innerHTML = "";
            lessons.forEach((les, idx) => {
                const btn = document.createElement("button");
                btn.className = `lesson-btn ${idx === currentLessonIndex ? 'active' : ''}`;
                btn.innerText = les.title.split(":")[0]; // Short dynamic title
                btn.onclick = () => loadLesson(idx);
                menuContainer.appendChild(btn);
            });
        }

        // Change the actively loaded course context
        function loadLesson(index) {
            currentLessonIndex = index;
            buildMenu();
            const target = lessons[index];
            document.getElementById("lessonTitle").innerHTML = target.title;
            document.getElementById("lessonTask").innerHTML = target.task;
            document.getElementById("codeEditor").value = target.defaultCode;
            outputElement.innerText = "✏️ Code workspace reset. Ready to analyze execution paths.";
        }

        // Bootstrap execution engine components
        async function initPython() {
            try {
                pyodide = await loadPyodide();
                outputElement.innerText = "✅ Compiler connected! Choose a lesson above, type your answer, and tap Run.";
                runBtn.innerText = "▶ RUN PYTHON CODE";
                runBtn.disabled = false;
                loadLesson(0);
            } catch (err) {
                outputElement.innerText = "❌ Engine Initialization crashed: " + err.message;
            }
        }

        // Output capture parsing logic streams
        async function runPythonCode() {
            if (!pyodide) return;
            runBtn.innerText = "⚡ RUNNING...";
            runBtn.disabled = true;
            outputElement.innerText = "Processing script matrices...";
            
            const code = document.getElementById("codeEditor").value;

            try {
                await pyodide.runPythonAsync("import sys\nimport io\nsys.stdout = io.StringIO()");
                await pyodide.runPythonAsync(code);
                const stdout = await pyodide.runPythonAsync("sys.stdout.getvalue()");
                outputElement.innerText = stdout || "Script executed successfully with zero returned log values.";
            } catch (err) {
                outputElement.innerText = "❌ Python Error:\n" + err.message;
            }
            
            runBtn.innerText = "▶ RUN PYTHON CODE";
            runBtn.disabled = false;
        }

        initPython();
    </script>
</body>
</html>
