<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 PyMaster (Mobile Edition)</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { background-color: #04091a; color: #a8c8e8; font-family: sans-serif; padding: 15px; margin: 0; }
        h2 { color: #dff0ff; margin: 10px 0; font-size: 20px; }
        .panel { background: #080f22; padding: 15px; border-radius: 10px; border: 1px solid #132440; margin-bottom: 15px; }
        textarea { width: 100%; height: 180px; background: #0c1830; color: #dff0ff; padding: 12px; font-family: monospace; border-radius: 10px; border: 1px solid #132440; resize: none; font-size: 14px; box-sizing: border-box; outline: none; }
        button { background: #39ff14; color: #000; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; width: 100%; margin-top: 10px; }
        button:disabled { background: #132440; color: #3a6080; }
        .output-box { background: #020810; padding: 12px; font-family: monospace; border-radius: 10px; border: 1px solid #132440; color: #00d4ff; margin-top: 15px; min-height: 80px; }
        pre { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h2>🐍 PyMaster Editor</h2>
    
    <div class="panel">
        <h3 style="color: #dff0ff; margin: 0 0 5px 0; font-size: 16px;">🌱 Foundations: Variables</h3>
        <p style="margin: 0; font-size: 13px; line-height: 1.5;"><strong>Your Task:</strong> Create a variable named <code>city</code> and assign your city name to it. Then write <code>print(city)</code> and click Run!</p>
    </div>

    <div class="panel">
        <textarea id="codeEditor"># Write your Python code here
name = "Alex"
age = 25
print("Hello " + name + ", age " + str(age))
</textarea>
        <button id="runBtn" onclick="runPythonCode()" disabled>⏳ LOADING PYTHON ENGINE...</button>
        <div class="output-box">
            <div style="color: #3a6080; font-size: 11px; margin-bottom: 5px;">Console Output:</div>
            <pre id="output">Initializing mobile Python workspace environment...</pre>
        </div>
    </div>

    <script>
        let pyodide;
        const outputElement = document.getElementById("output");
        const runBtn = document.getElementById("runBtn");

        async function initPython() {
            try {
                pyodide = await loadPyodide();
                outputElement.innerText = "✅ Python ready! Write your script and tap Run.";
                runBtn.innerText = "▶ RUN PYTHON CODE";
                runBtn.disabled = false;
            } catch (err) {
                outputElement.innerText = "❌ Initialization failed: " + err.message;
            }
        }
        initPython();

        async function runPythonCode() {
            if (!pyodide) return;
            runBtn.innerText = "⚡ RUNNING...";
            runBtn.disabled = true;
            outputElement.innerText = "Compiling logic runtime streams...";
            
            const code = document.getElementById("codeEditor").value;

            try {
                await pyodide.runPythonAsync("import sys\nimport io\nsys.stdout = io.StringIO()");
                await pyodide.runPythonAsync(code);
                const stdout = await pyodide.runPythonAsync("sys.stdout.getvalue()");
                outputElement.innerText = stdout || "Code ran with no printed outputs.";
            } catch (err) {
                outputElement.innerText = "❌ Python Error:\n" + err.message;
            }
            
            runBtn.innerText = "▶ RUN PYTHON CODE";
            runBtn.disabled = false;
        }
    </script>
</body>
</html>
